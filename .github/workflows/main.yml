name: Adblock Factory (B Mode, Multi-Source, Safe)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

concurrency:
  group: adblock-factory
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build (rules + scripts)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p scripts rules reports build

          NOW="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          fetch_one() {
            local url content code
            for url in "$@"; do
              set +e
              content="$(curl -fsSL --retry 5 --retry-delay 3 --connect-timeout 20 "$url" 2>/dev/null)"
              code=$?
              set -e
              if [ "$code" -eq 0 ] && [ -n "$content" ] && ! printf '%s' "$content" | grep -qiE '<!doctype html|<html'; then
                printf '%s' "$content"
                return 0
              fi
            done
            return 1
          }

          normalize_rules() {
            awk '
              function trim(s){ sub(/^[ \t]+/,"",s); sub(/[ \t]+$/,"",s); return s }
              {
                line=trim($0)
                if (line=="" || line ~ /^!/ || line ~ /^#/) next

                if (line ~ /^(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD|IP-CIDR|IP-CIDR6|GEOIP),/) {
                  sub(/,(REJECT|DIRECT|PROXY|REJECT-TINYGIF)$/,"",line)
                  print line
                  next
                }

                if (line ~ /^\|\|/) {
                  gsub(/^\|\|/,"",line)
                  gsub(/\^.*$/,"",line)
                  if (line != "") print "DOMAIN-SUFFIX," line
                  next
                }

                if (line ~ /^[0-9.]+[ \t]+[A-Za-z0-9.-]+$/) {
                  split(line,a,/[ \t]+/)
                  if (a[2] != "") print "DOMAIN-SUFFIX," a[2]
                  next
                }

                if (line ~ /^[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/) {
                  print "DOMAIN-SUFFIX," line
                }
              }'
          }

          extract_johnshall_rejects() {
            awk '
              BEGIN{inrule=0}
              /^\[Rule\]/{inrule=1; next}
              /^\[/{if(inrule) exit}
              inrule {
                line=$0
                gsub(/\r/,"",line)
                sub(/^[ \t]+/,"",line)
                sub(/[ \t]+$/,"",line)
                if (line=="" || line ~ /^#/ || line ~ /^!/) next
                if (line ~ /(REJECT|reject|REJECT-TINYGIF)/) print line
              }'
          }

          sanitize_js() {
            perl -0pe '
              s#https?://[^[:space:]"<>]+#https://blocked.invalid#g;
              s/\$httpClient\.(get|post|put|delete|head|options|patch|request)\s*\(/__blocked_httpClient__(/g;
              s/\$task\.fetch\s*\(/__blocked_task_fetch__(/g;
              s/\bGM_xmlhttpRequest\s*\(/__blocked_GM_xmlhttpRequest__(/g;
              s/\bfetch\s*\(/__blocked_fetch__(/g;
              s/\baxios\s*\(/__blocked_axios__(/g;
              s/\baxios\./__blocked_axios__./g;
              s/\beval\s*\(/__blocked_eval__(/g;
              s/\bFunction\s*\(/__blocked_Function__(/g;
              s/\bimportScripts\s*\(/__blocked_importScripts__(/g;
              s/\bnew\s+WebSocket\s*\(/new __blocked_WebSocket__(/g;
              s/\bnew\s+XMLHttpRequest\s*\(/new __blocked_XMLHttpRequest__(/g;
            '
          }

          prepend_stubs() {
            printf '%s\n' \
'/* auto-sanitized by GitHub Actions */' \
'function __blocked_httpClient__() { throw new Error("blocked external request"); }' \
'function __blocked_task_fetch__() { throw new Error("blocked external request"); }' \
'function __blocked_GM_xmlhttpRequest__() { throw new Error("blocked external request"); }' \
'function __blocked_fetch__() { throw new Error("blocked external request"); }' \
'function __blocked_eval__() { throw new Error("blocked dynamic execution"); }' \
'function __blocked_Function__() { throw new Error("blocked dynamic execution"); }' \
'function __blocked_importScripts__() { throw new Error("blocked importScripts"); }' \
'function __blocked_axios__() { throw new Error("blocked axios"); }' \
'__blocked_axios__.get = function() { throw new Error("blocked axios"); };' \
'__blocked_axios__.post = function() { throw new Error("blocked axios"); };' \
'__blocked_axios__.put = function() { throw new Error("blocked axios"); };' \
'__blocked_axios__.delete = function() { throw new Error("blocked axios"); };' \
'__blocked_axios__.patch = function() { throw new Error("blocked axios"); };' \
'__blocked_axios__.request = function() { throw new Error("blocked axios"); };' \
'__blocked_axios__.head = function() { throw new Error("blocked axios"); };' \
'__blocked_axios__.options = function() { throw new Error("blocked axios"); };' \
'__blocked_axios__.create = function() { throw new Error("blocked axios"); };' \
'class __blocked_WebSocket__ { constructor() { throw new Error("blocked WebSocket"); } }' \
'class __blocked_XMLHttpRequest__ { constructor() { throw new Error("blocked XMLHttpRequest"); } }'
          }

          build_script() {
            local out="$1"
            shift
            local content tmp

            if content="$(fetch_one "$@")"; then
              tmp="$(mktemp)"
              printf '%s\n' "$content" | sanitize_js > "$tmp"

              {
                printf '// built at %s\n' "$NOW"
                prepend_stubs
                cat "$tmp"
              } > "$out"

              rm -f "$tmp"
            else
              printf '%s\n' '/* fallback safe script */' '$done({});' > "$out"
            fi
          }

          echo "=== scripts ==="
          build_script scripts/startup.js \
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/script/startup/startup.js"

          build_script scripts/app_ads.js \
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/script/advertising/advertising.js"

          echo "=== rules required ==="
          anti_ad="$(fetch_one https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-surge.txt)" || {
            echo "ERROR: anti-AD unavailable"
            exit 1
          }
          printf '%s\n' "$anti_ad" | normalize_rules | awk 'NF && !seen[$0]++' > rules/anti-ad.txt

          hagezi="$(fetch_one https://raw.githubusercontent.com/hagezi/dns-blocklists/main/hosts/pro.plus.txt)" || {
            echo "ERROR: Hagezi unavailable"
            exit 1
          }
          printf '%s\n' "$hagezi" | normalize_rules | awk 'NF && !seen[$0]++' > rules/hagezi.txt

          echo "=== rules optional ==="
          if limbo="$(fetch_one https://raw.githubusercontent.com/limbopro/Adblock4limbo/main/Adblock4limbo.list)"; then
            printf '%s\n' "$limbo" | normalize_rules | awk 'NF && !seen[$0]++' > rules/limbo.txt
          else
            : > rules/limbo.txt
          fi

          if johnshall="$(fetch_one https://raw.githubusercontent.com/Johnshall/Shadowrocket-ADBlock-Rules-Forever/release/sr_cnip.conf)"; then
            printf '%s\n' "$johnshall" | extract_johnshall_rejects | normalize_rules | awk 'NF && !seen[$0]++' > rules/johnshall.txt
          else
            : > rules/johnshall.txt
          fi

          if adguard="$(fetch_one https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/master/Filters/filter.txt)"; then
            printf '%s\n' "$adguard" | normalize_rules | awk 'NF && !seen[$0]++' > rules/adguard.txt
          else
            : > rules/adguard.txt
          fi

          echo "=== merge ==="
          : > rules/ads_merged.txt
          for f in rules/*.txt; do
            [ "$(basename "$f")" = "ads_merged.txt" ] && continue
            [ -s "$f" ] || continue
            cat "$f" >> rules/ads_merged.txt
            printf '\n' >> rules/ads_merged.txt
          done
          awk 'NF && !seen[$0]++' rules/ads_merged.txt > rules/ads_merged.tmp
          mv rules/ads_merged.tmp rules/ads_merged.txt

          echo "=== audit ==="
          : > reports/script_scan.txt
          : > reports/rule_scan.txt

          if grep -RInE '\$httpClient\.|\$task\.fetch|\bGM_xmlhttpRequest\s*\(|\bfetch\s*\(|\baxios\.|\baxios\s*\(|\beval\s*\(|\bFunction\s*\(|\bimportScripts\s*\(|\bnew\s+WebSocket\s*\(|\bnew\s+XMLHttpRequest\s*\(' scripts/*.js > reports/script_scan.txt; then
            echo "Script high-risk patterns found:"
            cat reports/script_scan.txt
            exit 1
          fi

          if grep -RInE 'https?://|<!doctype html|<html' rules/*.txt > reports/rule_scan.txt; then
            echo "Invalid content found in rules:"
            cat reports/rule_scan.txt
            exit 1
          fi

          for f in scripts/*.js; do
            node --check "$f"
          done

          [ -s scripts/startup.js ] || exit 1
          [ -s scripts/app_ads.js ] || exit 1
          [ -s rules/anti-ad.txt ] || exit 1
          [ -s rules/hagezi.txt ] || exit 1
          [ -s rules/ads_merged.txt ] || exit 1

          python3 - <<'PY'
import hashlib, json, os, time, glob

def sha256(path):
    h = hashlib.sha256()
    with open(path, 'rb') as f:
        for chunk in iter(lambda: f.read(8192), b''):
            h.update(chunk)
    return h.hexdigest()

manifest = {
    "built_at_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
    "scripts": [],
    "rules": [],
}

for p in sorted(glob.glob("scripts/*.js")):
    manifest["scripts"].append({
        "path": p,
        "sha256": sha256(p),
        "bytes": os.path.getsize(p),
    })

for p in sorted(glob.glob("rules/*.txt")):
    manifest["rules"].append({
        "path": p,
        "sha256": sha256(p),
        "bytes": os.path.getsize(p),
    })

os.makedirs("build", exist_ok=True)
with open("build/manifest.json", "w", encoding="utf-8") as f:
    json.dump(manifest, f, ensure_ascii=False, indent=2)
PY

          echo "DONE"

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adblock-audit
          path: |
            reports/
            build/manifest.json

      - name: Commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add scripts rules build
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "update $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          git push
