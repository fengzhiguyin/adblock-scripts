name: Script Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Build Scripts
        run: |
          mkdir -p scripts

          for f in youtube.js global_ads.js; do
            echo "Processing $f"

            curl -fL https://raw.githubusercontent.com/${{ github.repository }}/main/sources/$f -o scripts/$f

            if grep -qi "<html" scripts/$f; then
              echo "ERROR: got HTML"
              exit 1
            fi

            sed -i 's/\$httpClient/console.log/g' scripts/$f

            echo "// built at $(date)" | cat - scripts/$f > tmp && mv tmp scripts/$f
          done

      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add scripts/*
          git commit -m "build" || exit 0
          git push
