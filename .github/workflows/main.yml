name: Adblock Factory FINAL STABLE

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch + Clean + Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p scripts rules

          fetch() {
            curl -fL --retry 5 --retry-delay 3 --connect-timeout 20 "$1"
          }

          is_html() {
            echo "$1" | grep -qiE "<!doctype html|<html"
          }

          sanitize_js() {
            # 只去明确风险行为，不破坏逻辑
            sed -E \
              -e 's/\$httpClient\.(get|post|put|delete)/console.log/g'
          }

          ensure_done() {
            if echo "$1" | grep -q '\$done'; then
              echo "$1"
            else
              echo "(function(){try{$1;\$done({});}catch(e){\$done({});}})();"
            fi
          }

          echo "=== YouTube Script ==="
          yt=$(fetch https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/script/youtube/youtube.js)
          is_html "$yt" && exit 1
          yt=$(echo "$yt" | sanitize_js)
          yt=$(ensure_done "$yt")
          echo "// built $(date -u)" > scripts/youtube.js
          echo "$yt" >> scripts/youtube.js

          echo "=== App Script ==="
          app=$(fetch https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/script/rewrite/Advertising/Advertising.js)
          is_html "$app" && exit 1
          app=$(echo "$app" | sanitize_js)
          app=$(ensure_done "$app")
          echo "// built $(date -u)" > scripts/app_ads.js
          echo "$app" >> scripts/app_ads.js

          echo "=== Anti-AD Rules ==="
          ad=$(fetch https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-surge.txt)
          is_html "$ad" && exit 1
          echo "# built $(date -u)" > rules/anti-ad.txt
          echo "$ad" >> rules/anti-ad.txt

          echo "=== Hagezi (convert to domain list) ==="
          hz=$(fetch https://raw.githubusercontent.com/hagezi/dns-blocklists/main/hosts/pro.txt)
          is_html "$hz" && exit 1

          # 转换 hosts → DOMAIN-SUFFIX
          echo "# built $(date -u)" > rules/hagezi.txt
          echo "$hz" | awk '/^0.0.0.0/ {print "DOMAIN-SUFFIX,"$2}' >> rules/hagezi.txt

      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add scripts rules
          git commit -m "auto update $(date -u)" || exit 0
          git push
