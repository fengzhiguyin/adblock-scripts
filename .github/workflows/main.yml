name: Adblock Factory (B Mode, Multi-Source, Safe)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * '

concurrency:
  group: adblock-factory
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build (rules + scripts)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p scripts rules reports build

          NOW="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          fetch_one() {
            local url content code
            for url in "$@"; do
              set +e
              content="$(curl -fsSL --retry 5 --retry-delay 3 --connect-timeout 20 "$url" 2>/dev/null)"
              code=$?
              set -e
              if [ "$code" -eq 0 ] && [ -n "$content" ] && ! printf '%s' "$content" | grep -qiE '<!doctype html|<html'; then
                printf '%s' "$content"
                return 0
              fi
            done
            return 1
          }

          normalize_rules() {
            awk '
              function trim(s){ sub(/^[ \t]+/,"",s); sub(/[ \t]+$/,"",s); return s }
              {
                line=trim($0)
                if (line=="" || line ~ /^!/ || line ~ /^#/) next

                if (line ~ /^(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD|IP-CIDR|IP-CIDR6|GEOIP),/) {
                  sub(/,(REJECT|DIRECT|PROXY|REJECT-TINYGIF)$/,"",line)
                  print line
                  next
                }

                if (line ~ /^||/) {
                  gsub(/^||/,"",line)
                  gsub(/^.$/,"",line)
                  if (line != "") print "DOMAIN-SUFFIX," line
                  next
                }

                if (line ~ /^[0-9.]+[ \t]+[A-Za-z0-9.-]+$/) {
                  split(line,a,/[ \t]+/)
                  if (a[2] != "") print "DOMAIN-SUFFIX," a[2]
                  next
                }

                if (line ~ /^[A-Za-z0-9.-]+.[A-Za-z]{2,}$/) {
                  print "DOMAIN-SUFFIX," line
                }
              }'
          }

          extract_johnshall_rejects() {
            awk '
              BEGIN{inrule=0}
              /^[Rule]/{inrule=1; next}
              /^[/{if(inrule) exit}
              inrule {
                line=$0
                gsub(/\r/,"",line)
                sub(/^[ \t]+/,"",line)
                sub(/[ \t]+$/,"",line)
                if (line=="" || line ~ /^#/ || line ~ /^!/) next
                if (line ~ /(REJECT|reject|REJECT-TINYGIF)/) print line
              }'
          }

          sanitize_js() {
            perl -0pe '
              s#https?://[^[:space:]"<>]+#https://blocked.invalid#g;
              s/$httpClient.(get|post|put|delete|head|options|patch|request)\s*(/blocked_httpClient(/g;
              s/$task.fetch\s*(/blocked_task_fetch(/g;
              s/\bGM_xmlhttpRequest\s*(/blocked_GM_xmlhttpRequest(/g;
              s/\bfetch\s*(/blocked_fetch(/g;
              s/\baxios\s*(/blocked_axios(/g;
              s/\baxios./blocked_axios./g;
              s/\beval\s*(/blocked_eval(/g;
              s/\bFunction\s*(/blocked_Function(/g;
              s/\bimportScripts\s*(/blocked_importScripts(/g;
              s/\bnew\s+WebSocket\s*(/new blocked_WebSocket(/g;
              s/\bnew\s+XMLHttpRequest\s*(/new blocked_XMLHttpRequest(/g;
            '
          }

          prepend_stubs() {
            printf '%s\n' '/* auto-sanitized by GitHub Actions /
function blocked_httpClient() { throw new Error("blocked external request"); }
function blocked_task_fetch() { throw new Error("blocked external request"); }
function blocked_GM_xmlhttpRequest() { throw new Error("blocked external request"); }
function blocked_fetch() { throw new Error("blocked external request"); }
function blocked_eval() { throw new Error("blocked dynamic execution"); }
function blocked_Function() { throw new Error("blocked dynamic execution"); }
function blocked_importScripts() { throw new Error("blocked importScripts"); }
function blocked_axios() { throw new Error("blocked axios"); }
blocked_axios.get = function() { throw new Error("blocked axios"); };
class blocked_WebSocket { constructor() { throw new Error("blocked WebSocket"); } }
class blocked_XMLHttpRequest { constructor() { throw new Error("blocked XMLHttpRequest"); } }'
          }

          build_script() {
            local out="$1"
            shift
            local content tmp

            if content="$(fetch_one "$@")"; then
              tmp="$(mktemp)"
              printf '%s\n' "$content" | sanitize_js > "$tmp"

              {
                printf '// built at %s\n' "$NOW"
                prepend_stubs
                cat "$tmp"
              } > "$out"

              rm -f "$tmp"
            else
              printf '%s\n' '/ fallback */ $done({});' > "$out"
            fi
          }

          echo "=== scripts ==="
          build_script scripts/startup.js 
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/script/startup/startup.js"

          build_script scripts/app_ads.js 
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/script/advertising/advertising.js"

          echo "=== rules ==="
          anti_ad="$(fetch_one https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-surge.txt)"
          printf '%s\n' "$anti_ad" | normalize_rules | awk 'NF && !seen[$0]++' > rules/ads_merged.txt

          echo "=== done ==="

      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add .
          git commit -m "update $(date -u +"%Y-%m-%dT%H:%M:%SZ")" || exit 0
          git push
